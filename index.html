<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlipUp - Memory Match Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="theme-futbol">
    <main class="app-container">
        <section class="view-section" id="screen-menu">
            <header class="brand-header">
                <h1 class="logo-text">Flip<span>Up</span></h1>
                <p class="subtitle">Entrena tu mente de forma divertida</p>
            </header>
            <div class="config-card">
                <form id="config-form">
                    <div class="form-group">
                        <label for="select-mode">Modo de Juego</label>
                        <select id="select-mode">
                            <option value="solitario">Clásico (Cronómetro)</option>
                            <option value="contrareloj">Contrarreloj Extremo</option>
                            <option value="pvp">Versus (1 vs 1)</option>
                            <option value="practica">Práctica Libre</option>
                        </select>
                    </div>
                    <div class="form-group row-inputs">
                        <div class="input-field">
                            <label for="input-p1">Jugador 1</label>
                            <input type="text" id="input-p1" value="Jugador 1" autocomplete="off">
                        </div>
                        <div class="input-field hidden" id="field-p2">
                            <label for="input-p2">Jugador 2</label>
                            <input type="text" id="input-p2" value="Jugador 2" autocomplete="off">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Dificultad</label>
                        <div class="radio-cards-group">
                            <label class="radio-card">
                                <input type="checkbox" name="difficulty" value="easy" checked>
                                <div class="card-box"><span class="title">Fácil</span><span class="desc">4x4</span></div>
                            </label>
                            <label class="radio-card">
                                <input type="checkbox" name="difficulty" value="medium">
                                <div class="card-box"><span class="title">Medio</span><span class="desc">6x6</span></div>
                            </label>
                            <label class="radio-card">
                                <input type="checkbox" name="difficulty" value="hard">
                                <div class="card-box"><span class="title">Difícil</span><span class="desc">8x8</span></div>
                            </label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Temática</label>
                        <div class="theme-selector-grid">
                            <button type="button" class="theme-btn active" data-theme="futbol">🏆 Mundial</button>
                            <button type="button" class="theme-btn" data-theme="animales">🐾 Animales</button>
                            <button type="button" class="theme-btn" data-theme="memes">😂 Memes</button>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">¡Comenzar Partida!</button>
                </form>
            </div>
        </section>

        <section class="view-section hidden" id="screen-game">
            <div class="dashboard-panel">
                <div class="dash-left">
                    <button class="btn-secondary" id="btn-quit">⬅ Salir</button>
                    <div class="player-badge active" id="badge-p1">
                        <span class="p-name" id="dash-name-p1">Jugador 1</span>
                        <span class="p-score" id="dash-score-p1">Pares: 0</span>
                    </div>
                    <div class="player-badge hidden" id="badge-p2">
                        <span class="p-name" id="dash-name-p2">Jugador 2</span>
                        <span class="p-score" id="dash-score-p2">Pares: 0</span>
                    </div>
                </div>
                <div class="dash-right">
                    <div class="stat-indicator" id="stat-timer-box">
                        <span class="label" id="timer-label">Tiempo</span>
                        <span class="val" id="dash-timer">00:00</span>
                    </div>
                    <div class="stat-indicator">
                        <span class="label">Intentos</span>
                        <span class="val" id="dash-moves">0</span>
                    </div>
                    <button class="btn-icon-reset" id="btn-reset" title="Reiniciar Tablero">🔄</button>
                </div>
            </div>

            <div class="game-layout">
                <div class="board-wrapper">
                    <div class="board" id="game-board"></div>
                </div>
                <aside class="achievements-sidebar">
                    <h3>🏆 Logros Obtenidos</h3>
                    <ul id="sidebar-achievements-list"></ul>
                </aside>
            </div>
        </section>

        <div class="modal-overlay hidden" id="screen-end">
            <div class="modal-card">
                <h2 id="end-title">¡Fin de la Partida!</h2>
                <p class="winner-announcement" id="end-subtitle"></p>
                <div class="stats-summary-grid">
                    <div class="summary-item"><span class="val" id="end-stat-moves">0</span><span class="label">Intentos</span></div>
                    <div class="summary-item" id="end-box-time"><span class="val" id="end-stat-time">00:00</span><span class="label">Tiempo</span></div>
                    <div class="summary-item"><span class="val" id="end-stat-accuracy">0%</span><span class="label">Precisión</span></div>
                </div>
                <div class="end-achievements-section">
                    <h4>Medallas Conseguidas</h4>
                    <div class="badges-row" id="end-achievements-container"></div>
                </div>
                <div class="modal-footer">
                    <button class="btn-secondary" id="btn-home">Menú Principal</button>
                    <button class="btn-primary" id="btn-replay">Volver a Jugar</button>
                </div>
            </div>
        </div>
    </main>

    <div class="toast-container" id="achievement-toast-container"></div>

    <script src="js/app.js"></script>
    <script src="js/themes.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/modes.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/board.js"></script>
    <script src="js/game.js"></script>
    <script src="js/achievements.js"></script>
    <script src="js/endScreen.js"></script>
    <script src="js/menu.js"></script>
</body>
</html>
